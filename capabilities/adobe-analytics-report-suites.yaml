naftiko: 1.0.0-alpha2
info:
  label: Adobe Analytics API — Report Suites
  description: 'Adobe Analytics API — Report Suites. 2 operations. Lead operation: Adobe Analytics List Report Suites. Self-contained
    Naftiko capability covering one Adobe Analytics business surface.'
  tags:
  - Adobe Analytics
  - Report Suites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_ANALYTICS_API_KEY: ADOBE_ANALYTICS_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-analytics-report-suites
    baseUri: https://analytics.adobe.io/api/{globalCompanyId}
    description: Adobe Analytics API — Report Suites business capability. Self-contained, no shared references.
    resources:
    - name: reportsuites-collections-suites
      path: /reportsuites/collections/suites
      operations:
      - name: listreportsuites
        method: GET
        description: Adobe Analytics List Report Suites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
    - name: reportsuites-collections-suites-rsid
      path: /reportsuites/collections/suites/{rsid}
      operations:
      - name: getreportsuite
        method: GET
        description: Adobe Analytics Get a Report Suite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_ANALYTICS_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-analytics-report-suites-rest
    port: 8080
    description: REST adapter for Adobe Analytics API — Report Suites. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reportsuites/collections/suites
      name: reportsuites-collections-suites
      description: REST surface for reportsuites-collections-suites.
      operations:
      - method: GET
        name: listreportsuites
        description: Adobe Analytics List Report Suites
        call: adobe-analytics-report-suites.listreportsuites
        with:
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reportsuites/collections/suites/{rsid}
      name: reportsuites-collections-suites-rsid
      description: REST surface for reportsuites-collections-suites-rsid.
      operations:
      - method: GET
        name: getreportsuite
        description: Adobe Analytics Get a Report Suite
        call: adobe-analytics-report-suites.getreportsuite
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-analytics-report-suites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Analytics API — Report Suites. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adobe-analytics-list-report-suites
      description: Adobe Analytics List Report Suites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-report-suites.listreportsuites
      with:
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-analytics-get-report-suite
      description: Adobe Analytics Get a Report Suite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-report-suites.getreportsuite
      outputParameters:
      - type: object
        mapping: $.
