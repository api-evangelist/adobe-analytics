naftiko: 1.0.0-alpha2
info:
  label: Adobe Analytics API — Date Ranges
  description: 'Adobe Analytics API — Date Ranges. 1 operations. Lead operation: Adobe Analytics List Date Ranges. Self-contained
    Naftiko capability covering one Adobe Analytics business surface.'
  tags:
  - Adobe Analytics
  - Date Ranges
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_ANALYTICS_API_KEY: ADOBE_ANALYTICS_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-analytics-date-ranges
    baseUri: https://analytics.adobe.io/api/{globalCompanyId}
    description: Adobe Analytics API — Date Ranges business capability. Self-contained, no shared references.
    resources:
    - name: dateranges
      path: /dateranges
      operations:
      - name: listdateranges
        method: GET
        description: Adobe Analytics List Date Ranges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.ADOBE_ANALYTICS_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-analytics-date-ranges-rest
    port: 8080
    description: REST adapter for Adobe Analytics API — Date Ranges. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/dateranges
      name: dateranges
      description: REST surface for dateranges.
      operations:
      - method: GET
        name: listdateranges
        description: Adobe Analytics List Date Ranges
        call: adobe-analytics-date-ranges.listdateranges
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-analytics-date-ranges-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Analytics API — Date Ranges. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adobe-analytics-list-date-ranges
      description: Adobe Analytics List Date Ranges
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-date-ranges.listdateranges
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
