naftiko: "1.0.0-alpha1"

info:
  label: "Adobe Analytics Data Repair API"
  description: "Permanently delete or transform previously ingested Adobe Analytics data for privacy compliance and data quality, using a two-step estimate-then-repair workflow."
  tags:
    - Adobe Analytics
    - Data Repair
    - Privacy
    - Data Quality
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      ADOBE_ANALYTICS_BEARER_TOKEN: ADOBE_ANALYTICS_BEARER_TOKEN
      ADOBE_ANALYTICS_API_KEY: ADOBE_ANALYTICS_API_KEY

capability:
  consumes:
    - type: http
      namespace: adobe-data-repair
      baseUri: "https://analytics.adobe.io/api/{{ADOBE_ANALYTICS_GLOBAL_COMPANY_ID}}/datarepair/v1"
      description: "Adobe Analytics Data Repair API for deleting or transforming ingested data."
      authentication:
        type: bearer
        token: "{{ADOBE_ANALYTICS_BEARER_TOKEN}}"
      resources:
        - name: server-call-estimate
          path: /
          description: "Server call estimation for data repair."
          operations:
            - name: get-server-call-estimate
              method: GET
              path: /{rsid}/serverCallEstimate
              description: "Calculate the number of data rows that would be scanned for a repair job."
              inputParameters:
                - name: rsid
                  in: path
                  type: string
                  required: true
                  description: "The report suite ID."
                - name: dateRangeStart
                  in: query
                  type: string
                  required: true
                  description: "Start date in ISO 8601 format (YYYY-MM-DD)."
                - name: dateRangeEnd
                  in: query
                  type: string
                  required: true
                  description: "End date in ISO 8601 format (YYYY-MM-DD)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: repair-jobs
          path: /
          description: "Data repair job operations."
          operations:
            - name: list-repair-jobs
              method: GET
              path: /{rsid}/job
              description: "List the most recent 20 data repair jobs for a report suite."
              inputParameters:
                - name: rsid
                  in: path
                  type: string
                  required: true
                  description: "The report suite ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-repair-job
              method: POST
              path: /{rsid}/job
              description: "Create and start a new data repair job."
              inputParameters:
                - name: rsid
                  in: path
                  type: string
                  required: true
                  description: "The report suite ID."
                - name: validationToken
                  in: query
                  type: string
                  required: true
                  description: "Token from serverCallEstimate confirming cost review."
              body:
                type: json
                data:
                  variables: "{{tools.variables}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-repair-job
              method: GET
              path: /{rsid}/job/{jobId}
              description: "Get status and details for a specific data repair job."
              inputParameters:
                - name: rsid
                  in: path
                  type: string
                  required: true
                  description: "The report suite ID."
                - name: jobId
                  in: path
                  type: integer
                  required: true
                  description: "The repair job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: adobe-data-repair-api
      resources:
        - path: /v1/report-suites/{rsid}/server-call-estimate
          name: server-call-estimate
          description: "Estimate repair scope and cost."
          operations:
            - method: GET
              name: get-server-call-estimate
              description: "Get server call estimate for a repair job."
              call: "adobe-data-repair.get-server-call-estimate"
              with:
                rsid: "rest.rsid"
                dateRangeStart: "rest.dateRangeStart"
                dateRangeEnd: "rest.dateRangeEnd"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/report-suites/{rsid}/repair-jobs
          name: repair-jobs
          description: "Data repair job operations."
          operations:
            - method: GET
              name: list-repair-jobs
              description: "List repair jobs."
              call: "adobe-data-repair.list-repair-jobs"
              with:
                rsid: "rest.rsid"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-repair-job
              description: "Create a repair job."
              call: "adobe-data-repair.create-repair-job"
              with:
                rsid: "rest.rsid"
                validationToken: "rest.validationToken"
                variables: "rest.variables"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/report-suites/{rsid}/repair-jobs/{jobId}
          name: repair-job-detail
          description: "Single repair job operations."
          operations:
            - method: GET
              name: get-repair-job
              description: "Get repair job status."
              call: "adobe-data-repair.get-repair-job"
              with:
                rsid: "rest.rsid"
                jobId: "rest.jobId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: adobe-data-repair-mcp
      transport: http
      tools:
        - name: get-server-call-estimate
          description: "Estimate the number of data rows that would be scanned for a repair job."
          hints:
            readOnly: true
            idempotent: true
          call: "adobe-data-repair.get-server-call-estimate"
          with:
            rsid: "tools.rsid"
            dateRangeStart: "tools.dateRangeStart"
            dateRangeEnd: "tools.dateRangeEnd"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-repair-jobs
          description: "List the most recent 20 data repair jobs for a report suite."
          hints:
            readOnly: true
            idempotent: true
          call: "adobe-data-repair.list-repair-jobs"
          with:
            rsid: "tools.rsid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-repair-job
          description: "Create and start a new data repair job to delete or transform ingested data."
          hints:
            readOnly: false
            destructive: true
            idempotent: false
          call: "adobe-data-repair.create-repair-job"
          with:
            rsid: "tools.rsid"
            validationToken: "tools.validationToken"
            variables: "tools.variables"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-repair-job
          description: "Get the current status and details for a specific data repair job."
          hints:
            readOnly: true
            idempotent: true
          call: "adobe-data-repair.get-repair-job"
          with:
            rsid: "tools.rsid"
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
