naftiko: 1.0.0-alpha2
info:
  label: Adobe Analytics API — Metrics
  description: 'Adobe Analytics API — Metrics. 1 operations. Lead operation: Adobe Analytics List Metrics. Self-contained
    Naftiko capability covering one Adobe Analytics business surface.'
  tags:
  - Adobe Analytics
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_ANALYTICS_API_KEY: ADOBE_ANALYTICS_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-analytics-metrics
    baseUri: https://analytics.adobe.io/api/{globalCompanyId}
    description: Adobe Analytics API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metrics
      path: /metrics
      operations:
      - name: listmetrics
        method: GET
        description: Adobe Analytics List Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_ANALYTICS_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-analytics-metrics-rest
    port: 8080
    description: REST adapter for Adobe Analytics API — Metrics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/metrics
      name: metrics
      description: REST surface for metrics.
      operations:
      - method: GET
        name: listmetrics
        description: Adobe Analytics List Metrics
        call: adobe-analytics-metrics.listmetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-analytics-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Analytics API — Metrics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adobe-analytics-list-metrics
      description: Adobe Analytics List Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-analytics-metrics.listmetrics
      outputParameters:
      - type: object
        mapping: $.
