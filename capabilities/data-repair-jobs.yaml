naftiko: 1.0.0-alpha2
info:
  label: Adobe Analytics Data Repair API — Jobs
  description: 'Adobe Analytics Data Repair API — Jobs. 3 operations. Lead operation: Adobe Analytics List Data Repair Jobs.
    Self-contained Naftiko capability covering one Adobe Analytics business surface.'
  tags:
  - Adobe Analytics
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_ANALYTICS_API_KEY: ADOBE_ANALYTICS_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-repair-jobs
    baseUri: https://analytics.adobe.io/api/{globalCompanyId}/datarepair/v1
    description: Adobe Analytics Data Repair API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: rsid-job
      path: /{rsid}/job
      operations:
      - name: listjobs
        method: GET
        description: Adobe Analytics List Data Repair Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrepairjob
        method: POST
        description: Adobe Analytics Create a Data Repair Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: validationToken
          in: query
          type: string
          description: The token returned by the serverCallEstimate endpoint, confirming you have reviewed the cost estimate
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rsid-job-jobId
      path: /{rsid}/job/{jobId}
      operations:
      - name: getrepairjob
        method: GET
        description: Adobe Analytics Get a Data Repair Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: integer
          description: The repair job ID returned when the job was created
          required: true
    authentication:
      type: bearer
      token: '{{env.ADOBE_ANALYTICS_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-repair-jobs-rest
    port: 8080
    description: REST adapter for Adobe Analytics Data Repair API — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{rsid}/job
      name: rsid-job
      description: REST surface for rsid-job.
      operations:
      - method: GET
        name: listjobs
        description: Adobe Analytics List Data Repair Jobs
        call: data-repair-jobs.listjobs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrepairjob
        description: Adobe Analytics Create a Data Repair Job
        call: data-repair-jobs.createrepairjob
        with:
          validationToken: rest.validationToken
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{rsid}/job/{jobid}
      name: rsid-job-jobid
      description: REST surface for rsid-job-jobId.
      operations:
      - method: GET
        name: getrepairjob
        description: Adobe Analytics Get a Data Repair Job
        call: data-repair-jobs.getrepairjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-repair-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Analytics Data Repair API — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adobe-analytics-list-data-repair
      description: Adobe Analytics List Data Repair Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-repair-jobs.listjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-analytics-create-data-repair
      description: Adobe Analytics Create a Data Repair Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-repair-jobs.createrepairjob
      with:
        validationToken: tools.validationToken
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-analytics-get-data-repair
      description: Adobe Analytics Get a Data Repair Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-repair-jobs.getrepairjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
