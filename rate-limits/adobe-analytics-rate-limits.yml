specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Adobe Analytics
providerId: adobe-analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Analytics
  - Web Analytics
notes: >-
  Adobe Analytics API throttling is documented per endpoint but exact
  per-second / per-minute numbers vary by company configuration and Reporting
  API version (1.4 vs 2.0). Adobe documents that 429s should trigger
  exponential backoff; specific numeric ceilings are deferred to
  developer.adobe.com/analytics-apis.
description: >-
  Adobe Analytics enforces request rate limits per Adobe IMS organization /
  company. Reporting API 2.0, Bulk Data Insertion, Livestream, and Data Repair
  each have their own throttling envelopes; sustained excess returns 429.
  Limits apply across all keys for a single company.
sources:
  - https://developer.adobe.com/analytics-apis/docs/2.0/
  - https://experienceleague.adobe.com/docs/analytics/analyze/analysis-workspace/build-workspace-project/api-throttling.html
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Reporting API 2.0 throttling
    scope: company
    metric: requests_per_minute
    limit: see https://developer.adobe.com/analytics-apis/docs/2.0/
    notes: >-
      Per-company-scoped rate limits enforced by the Reporting API; sustained
      excess returns HTTP 429 with a Retry-After header.
  - name: Bulk Data Insertion API
    scope: company
    metric: requests_per_minute
    limit: see https://developer.adobe.com/analytics-apis/docs/2.0/guides/endpoints/data-ingestion/
    notes: >-
      Bulk ingestion accepts compressed batches; per-file size limits apply.
  - name: Livestream API
    scope: company
    metric: concurrent_connections
    limit: see https://developer.adobe.com/analytics-apis/docs/2.0/guides/endpoints/livestream/
    notes: Long-lived streaming connection with per-company concurrency caps.
policies:
  - name: Backoff Strategy
    description: Exponential backoff with jitter; honor Retry-After when present.
  - name: Per-company scope
    description: >-
      Limits are aggregated across all OAuth/JWT credentials issued under
      a single Adobe IMS organization, not per API key.
  - name: Async reporting
    description: >-
      Long-running reports should use the asynchronous reporting endpoints
      to avoid synchronous throttling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
