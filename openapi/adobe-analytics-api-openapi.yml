        calculated metrics.
      tags:
      - Calculated Metrics
      parameters:
      - $ref: '#/components/parameters/locale'
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 1000
        example: 10
      - name: page
        in: query
        schema:
          type: integer
          default: 0
        example: 10
      - name: expansion
        in: query
        description: Comma-separated additional fields to include
        schema:
          type: string
        example: example_value
      - name: includeType
        in: query
        description: Controls which calculated metrics are returned
        schema:
