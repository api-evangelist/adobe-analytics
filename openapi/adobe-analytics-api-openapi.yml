openapi: 3.1.0
info:
  title: Adobe Analytics API
  description: >-
    The Adobe Analytics 2.0 APIs provide programmatic access to data, reports,
    and administration features within Adobe Analytics. You can perform almost
    any action available in the Analytics user interface, including reporting,
    segment management, calculated metrics, dimensions, and component
    administration.
  version: '2.0'
  contact:
    name: Adobe Analytics Support
    url: https://developer.adobe.com/analytics-apis/docs/2.0/support/
  termsOfService: https://www.adobe.com/legal/terms.html
  x-last-validated: '2026-04-18'
externalDocs:
  description: Adobe Analytics 2.0 API Documentation
  url: https://developer.adobe.com/analytics-apis/docs/2.0/
servers:
- url: https://analytics.adobe.io/api/{globalCompanyId}
  description: Adobe Analytics Production API
  variables:
    globalCompanyId:
      description: The global company ID for your Adobe Analytics organization
      default: YOUR_GLOBAL_COMPANY_ID
tags:
- name: Annotations
  description: Manage analytics annotations
- name: Calculated Metrics
  description: Manage calculated metrics built from existing metrics
- name: Date Ranges
  description: Manage saved date ranges
- name: Dimensions
  description: Retrieve available dimensions for a report suite
- name: Metrics
  description: Retrieve available metrics for a report suite
- name: Report Suites
  description: Retrieve report suite information and configuration
- name: Reports
  description: Run analytics reports and retrieve data
- name: Segments
  description: Create, retrieve, update, and delete analytics segments
security:
- bearerAuth: []
  apiKey: []
paths:
  /reports:
    post:
      operationId: runReport
      summary: Adobe Analytics Run a Report
      description: >-
        Runs an analytics report based on the provided report request definition.
        The request body specifies metrics, dimensions, date ranges, filters,
        and other parameters to define the report output.
      tags:
      - Reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
            examples:
              RunreportRequestExample:
                summary: Default runReport request
                x-microcks-default: true
                value:
                  rsid: '500123'
                  locale: example_value
                  globalFilters:
                  - type: dateRange
                    dateRange: example_value
                    segmentId: '500123'
                    dimension: example_value
                    itemId: '500123'
                  metricContainer:
                    metrics:
                    - {}
                    metricFilters:
                    - {}
                  dimension: example_value
                  settings:
                    limit: 10
                    page: 10
                    nonesBehavior: exclude-nones
                  statistics: example_value
      responses:
        '200':
          description: Report results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
              examples:
                Runreport200Example:
                  summary: Default runReport 200 response
                  x-microcks-default: true
                  value:
                    totalPages: 42
                    numberOfElements: 10
                    rows:
                    - itemId: '500123'
                      value: example_value
                      data: {}
                    columns: example_value
                    summaryData: example_value
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Runreport400Example:
                  summary: Default runReport 400 response
                  x-microcks-default: true
                  value:
                    errorCode: example_value
                    errorDescription: example_value
                    errorId: '500123'
        '401':
          description: Unauthorized - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Runreport401Example:
                  summary: Default runReport 401 response
                  x-microcks-default: true
                  value:
                    errorCode: example_value
                    errorDescription: example_value
                    errorId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /segments:
    get:
      operationId: listSegments
      summary: Adobe Analytics List Segments
      description: >-
        Retrieves a list of segments for the company. Supports filtering by
        name, tag, owner, and report suite, as well as pagination and expansion
        of additional fields.
      tags:
      - Segments
      parameters:
      - $ref: '#/components/parameters/locale'
      - $ref: '#/components/parameters/filterByIds'
      - name: limit
        in: query
        description: Maximum number of results per page (max 1000)
        schema:
          type: integer
          default: 10
          maximum: 1000
        example: 10
      - name: page
        in: query
        description: Page number (zero-indexed)
        schema:
          type: integer
          default: 0
        example: 10
      - name: expansion
        in: query
        description: >-
          Comma-separated list of additional fields to include. Valid values:
          reportSuiteName, ownerFullName, modified, tags, compatibility,
          definition, publishingStatus, definitionLastModified, categories
        schema:
          type: string
        example: example_value
      - name: includeType
        in: query
        description: >-
          Controls which segments are returned. Use 'all' for all company
          segments (admin only), 'shared' for shared segments, 'templates'
          for template segments.
        schema:
          type: string
          enum:
          - all
          - shared
          - templates
        example: all
      responses:
        '200':
          description: List of segments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentList'
              examples:
                Listsegments200Example:
                  summary: Default listSegments 200 response
                  x-microcks-default: true
                  value:
                    content:
                    - id: abc123
                      name: Example Title
                      description: A sample description.
                      rsid: '500123'
                      definition: example_value
                      modified: '2026-01-15T10:30:00Z'
                      tags: {}
                    totalElements: 42
                    totalPages: 42
                    numberOfElements: 10
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Listsegments401Example:
                  summary: Default listSegments 401 response
                  x-microcks-default: true
                  value:
                    errorCode: example_value
                    errorDescription: example_value
                    errorId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createSegment
      summary: Adobe Analytics Create a Segment
      description: >-
        Creates a new analytics segment. The segment definition uses the
        Analytics query language to specify filter criteria based on dimensions,
        metrics, and events.
      tags:
      - Segments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentCreate'
            examples:
              CreatesegmentRequestExample:
                summary: Default createSegment request
                x-microcks-default: true
                value:
                  name: Example Title
                  description: A sample description.
                  rsid: '500123'
                  definition: example_value
      responses:
        '200':
          description: Segment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
              examples:
                Createsegment200Example:
                  summary: Default createSegment 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    name: Example Title
                    description: A sample description.
                    rsid: '500123'
                    owner:
                      id: abc123
                      name: Example Title
                      login: example_value
                    definition: example_value
                    modified: '2026-01-15T10:30:00Z'
                    tags:
                    - id: abc123
                      name: Example Title
                      description: A sample description.
                      components: {}
        '400':
          description: Invalid segment definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Createsegment400Example:
                  summary: Default createSegment 400 response
                  x-microcks-default: true
                  value:
                    errorCode: example_value
                    errorDescription: example_value
                    errorId: '500123'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Createsegment401Example:
                  summary: Default createSegment 401 response
                  x-microcks-default: true
                  value:
                    errorCode: example_value
                    errorDescription: example_value
                    errorId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /segments/{segmentId}:
    get:
      operationId: getSegment
      summary: Adobe Analytics Get a Segment
      description: >-
        Retrieves a single segment by its ID, including its definition and
        associated metadata.
