  /metrics:
    get:
      operationId: listMetrics
      summary: Adobe Analytics List Metrics
      description: >-
        Returns a list of all metrics available in the specified report suite,
        including standard metrics and any calculated metrics. Metrics are
        returned as objects containing the ID, name, type, and description.
      tags:
      - Metrics
      parameters:
      - $ref: '#/components/parameters/rsid'
      - $ref: '#/components/parameters/locale'
      responses:
        '200':
          description: List of metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Metric'
              examples:
                Listmetrics200Example:
                  summary: Default listMetrics 200 response
                  x-microcks-default: true
                  value:
                  - id: abc123
                    title: Example Title
                    name: Example Title
                    type: INT
                    extraTitleInfo: example_value
                    category: example_value
                    description: A sample description.
        '400':
          description: Missing or invalid rsid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Listmetrics400Example:
                  summary: Default listMetrics 400 response
                  x-microcks-default: true
