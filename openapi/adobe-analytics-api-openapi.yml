                    errorId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateSegment
      summary: Adobe Analytics Update a Segment
      description: >-
        Updates an existing segment. Supports partial updates — you can send
        only the fields you want to change. Tags, compatibility, and
        reportSuiteName cannot be edited via this endpoint.
      tags:
      - Segments
      parameters:
      - $ref: '#/components/parameters/segmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentCreate'
            examples:
              UpdatesegmentRequestExample:
                summary: Default updateSegment request
                x-microcks-default: true
                value:
                  name: Example Title
                  description: A sample description.
                  rsid: '500123'
                  definition: example_value
      responses:
        '200':
          description: Updated segment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
              examples:
                Updatesegment200Example:
                  summary: Default updateSegment 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    name: Example Title
                    description: A sample description.
                    rsid: '500123'
                    owner:
                      id: abc123
                      name: Example Title
                      login: example_value
                    definition: example_value
                    modified: '2026-01-15T10:30:00Z'
                    tags:
                    - id: abc123
                      name: Example Title
                      description: A sample description.
                      components: {}
        '404':
          description: Segment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Updatesegment404Example:
                  summary: Default updateSegment 404 response
                  x-microcks-default: true
                  value:
                    errorCode: example_value
                    errorDescription: example_value
                    errorId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteSegment
      summary: Adobe Analytics Delete a Segment
      description: Permanently deletes the specified segment.
      tags:
      - Segments
      parameters:
      - $ref: '#/components/parameters/segmentId'
      responses:
        '200':
          description: Segment deleted successfully
        '404':
          description: Segment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Deletesegment404Example:
