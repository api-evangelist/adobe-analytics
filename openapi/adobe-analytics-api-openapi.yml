        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createAnnotation
      summary: Adobe Analytics Create an Annotation
      description: Creates a new annotation for a report suite date range.
      tags:
      - Annotations
      requestBody:
        required: true
        content:
