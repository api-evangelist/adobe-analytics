specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Adobe Analytics
providerId: adobe-analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Analytics
  - Web Analytics
notes: >-
  Adobe Analytics is contact-sales enterprise SaaS; line-item amounts are
  contract-specific. FinOps levers focus on server-call commit management,
  Workspace seat allocation, and unused-SKU consolidation rather than
  on-demand metering.
description: >-
  FOCUS-aligned FinOps shape for Adobe Analytics: enterprise contract
  licensing keyed to annual server-call commit, Workspace seats, and feature
  bundle (Select / Prime / Ultimate). API access is included.
sources:
  - https://business.adobe.com/products/analytics/adobe-analytics.html
  - https://developer.adobe.com/analytics-apis/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Adobe Inc.
serviceCategory: Analytics
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Adobe Analytics
  ServiceCategory: Analytics
  ProviderName: Adobe
  PublisherName: Adobe Inc.
  InvoiceIssuerName: Adobe Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: server_calls
    description: Tracked Adobe Analytics server calls against the annual commit
    unit: server_call
    aggregation: sum
    dimensions:
      - report_suite
      - environment
  - name: workspace_seats
    description: Named Workspace user licenses
    unit: seat-month
    aggregation: sum
    dimensions:
      - role
  - name: api_requests
    description: Reporting API 2.0 / Bulk Data Insertion / Livestream calls (no incremental charge; tracked for capacity)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
principles:
  - name: Visibility
    description: >-
      Use the Adobe Analytics Admin Console Server Call Usage report and
      Workspace audit logs to track consumption against the annual commit.
  - name: Allocation
    description: >-
      Allocate server-call cost to product or business unit using report-suite
      naming conventions and the Workspace audit log.
  - name: Optimization
    description: >-
      Audit unused Workspace seats quarterly; archive low-traffic report
      suites; deduplicate client / server-side beacon implementations to
      reduce wasted server calls; right-size the SKU at renewal.
  - name: Accountability
    description: >-
      Adobe TAM and CSM run quarterly business reviews against the contracted
      server-call commit; finance owns true-up reconciliation at year end.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
