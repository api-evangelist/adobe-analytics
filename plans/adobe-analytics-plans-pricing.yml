specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Adobe Analytics
providerId: adobe-analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Business Intelligence
  - Customer Intelligence
  - Digital Marketing
  - Web Analytics
notes: >-
  Adobe Analytics is sold via enterprise contract through Adobe sales. List
  pricing is not published; SKUs include Select, Prime, and Ultimate, priced
  by server-call volume, included Workspace seats, and feature bundles. API
  access is included with all SKUs at no extra charge.
description: >-
  Adobe Analytics is an enterprise web/customer analytics product priced
  through contact-sales contracts based on server-call volume and feature
  bundle (Select / Prime / Ultimate). The API surface is included with the
  underlying license and is not separately metered.
sources:
  - https://business.adobe.com/products/analytics/adobe-analytics.html
  - https://developer.adobe.com/analytics-apis/
plans:
  - id: adobe-analytics-select
    name: Analytics Select
    type: enterprise
    description: >-
      Entry enterprise tier. Includes core Analysis Workspace, segmentation,
      and reporting APIs.
    entries:
      - label: Server-call commit
        name: server_calls
        type: subscription
        metric: server_call
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Analysis Workspace
      - name: Reporting API 2.0
      - name: Segmentation API
      - name: Data Insertion API
  - id: adobe-analytics-prime
    name: Analytics Prime
    type: enterprise
    description: >-
      Mid-tier enterprise. Adds Customer Journey Analytics integration,
      advanced segmentation, and attribution modelling.
    entries:
      - label: Server-call commit
        name: server_calls
        type: subscription
        metric: server_call
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Select features
      - name: Attribution IQ
      - name: Advanced segmentation
      - name: Bulk Data Insertion API
      - name: Livestream API
  - id: adobe-analytics-ultimate
    name: Analytics Ultimate
    type: enterprise
    description: >-
      Top enterprise tier. Includes predictive analytics, premium support,
      and Customer Journey Analytics.
    entries:
      - label: Server-call commit
        name: server_calls
        type: subscription
        metric: server_call
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Prime features
      - name: Predictive Workspace
      - name: Customer Journey Analytics
      - name: Data Repair API
      - name: Premium support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
